<!DOCTYPE html>
<html lang="en" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" type='text/css' href="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/devicon.min.css" />
    <link rel="stylesheet" href="css/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Flex:opsz,wght@8..144,100..1000&display=swap" rel="stylesheet">
</head>
<body>
    <main id="main-content" class="fade">
        <nav class="desktop">
            <div class="nav-container">
                <ul class="nav-links">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="projects.html">Projects</a></li>
                    <li><a href="#" class="active">Contact</a></li>
                </ul>
            </div>
        </nav>
        <!-- contact section -->
        <div id="contact">
                <div class="flex-contact-container">
                    <div class="grid-contact">
                        <div class="email-section">
                            <p class="email">
                                <a href="mailto:marcodmgzgil@gmail.com?subject=Mail%20from%20your%20portfolio">
                                    <i class="fa-solid fa-envelope"></i></i> marcodmgzgil@gmail.com
                                </a>
                            </p>
                        </div>
                        <div class="linkedin">
                                <a class="url" target="_blank" href="https://www.linkedin.com"><i class="devicon-linkedin-plain"></i></a>
                        </div>
                        <div class="github">
                            <a class="url" target="_blank" href="https://github.com/Marcodggz"><i class="devicon-github-original"></i>
                                <div class="github-text">
                                    <h2>Github Profile</h2>
                                    <p>Find more of my repositories</p>
                                </div></a>
                        </div>
                    
                        <div class="contact-me">
                            <form action="https://formspree.io/f/mayvlrgy" method="POST">
                                <h2>Contact with me</h2>
                                <p>You can also get in touch with me through this form below.</p>
                                    <div class="inner-wrapper">
                                        <label for="name">Name<input type="text" id="name" name="name" placeholder="Enter your name" required></label>
                                    </div>
                                    <div class="inner-wrapper">
                                         <label for="email">Email<input type="email" id="email" name="_replyto" placeholder="email@example.com" required></label>
                                    </div>                    
                                    <div class="inner-wrapper">
                                        <label for="message">Message<textarea id="message" name="message" placeholder="Enter your message here" minlength="10" required></textarea></label>
                                    </div>
                                <button class="button-message" type="submit">Send Message</button>
                            </form>
                        </div>
                    </div>
                </div>
        </div>
    </main>
</body>
</html>
