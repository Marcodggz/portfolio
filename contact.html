<!DOCTYPE html>
<html lang="en" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
    <link rel="stylesheet" type='text/css' href="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/devicon.min.css" />
    <link rel="stylesheet" href="css/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Flex:opsz,wght@8..144,100..1000&display=swap" rel="stylesheet">
</head>
<body>
    <main id="main-content" class="fade">
        <nav class="desktop">
            <div class="nav-container">
                <ul class="nav-links">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="projects.html">Projects</a></li>
                    <li><a href="#" class="active">Contact</a></li>
                </ul>
            </div>
        </nav>
        <div class="grid-contact">
            <section class="contact-container">
                <div class="email-section">
                    <p class="email">
                        <a href="mailto:marcodmgzgil@gmail.com?subject=Mail%20from%20your%20portfolio">
                        <i class="fas fa-envelope"></i> marcodmgzgil@gmail.com
                        </a>
                    </p>
                    <p>
                        <i class="devicon-linkedin-plain"></i>
                    </p>
                </div>
                <div class="github">
                    <p class="github-link">
                        <i class="devicon-github-original colored"></i>
                    </p>
                    <div class="github-text">
                        <h2>Github Profile</h2>
                        <p>Find more of my repositories</p>
                    </div>
                </div>
            </section>
            <section class="contact-me">
                <form action="https://formspree.io/f/mayvlrgy" method="POST">
                    <h2>Contact with me</h2>
                    <p>You can also get in touch with me through this form below.</p>
                    <div data-slot="input-wrapper">
                        <label for="name">Name:</label>
                        <div class="inner-wrapper">
                             <input type="text" id="name" name="name" placeholder="Enter your name" required>
                        </div>
                    </div>
                    <div data-slot="input-wrapper">
                        <label for="email">Email:</label>
                        <div class="inner-wrapper">
                            <input type="email" id="email" name="_replyto" placeholder="example@email.com" required>
                        </div>                    
                    </div>
                    <div data-slot="input-wrapper">
                        <label for="message">Message:</label>
                        <div class="inner-wrapper">
                            <textarea id="message" name="message" placeholder="Enter your message here" required></textarea>
                        </div>
                    </div>
                    <button class="button-message" type="submit">Send Message</button>
                </form>
            </section>
        </div>
    </main>
</body>
</html>
